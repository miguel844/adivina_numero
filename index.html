<body>

    <button id="checkBtn" disabled>Comprobar</button>
    <div id="result">

        <div>

            <p>message</p>
            <ul id="message">
                <li>hola</li>

            </ul>
        </div>

        <div>
            <p>History</p>
            <ul id="history"></ul>
            <li>holo</li>

            </ul>
        </div>

        <div>
            <p>Intento número: <span id="count"></span></p>
        </div>

    </div>

</body>

</body>
